version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-app
    container_name: laravel_app
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    networks:
      - laravel-network

  db:
    image: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 6145
      MYSQL_DATABASE: crudProdutos
      MYSQL_USER: root
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel-network

networks:
  laravel-network:
    driver: bridge

volumes:
  dbdata:
